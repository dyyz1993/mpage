name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build packages (ordered)
        run: |
          pnpm --filter @xcli/core run build 2>&1 || (echo "::group::Core build failed" && exit 1)
          pnpm --filter @xcli/tips run build 2>&1 || (echo "::group::Tips build failed" && exit 1)
          pnpm --filter @xcli/session run build 2>&1 || (echo "::group::Session build failed" && exit 1)
          pnpm --filter @xcli/browser run build 2>&1 || (echo "::group::Browser build failed" && exit 1)
          pnpm --filter xcli run build 2>&1 || (echo "::group::XCLI build failed" && exit 1)
          pnpm --filter @xcli/daemon run build 2>&1 || (echo "::group::Daemon build failed" && exit 1)
          pnpm --filter @xcli/ghcli run build 2>&1 || (echo "::group::GHCLI build failed" && exit 1)

      - name: Build mpage
        run: pnpm run build

  feishu-notify:
    name: Feishu Notification
    if: always()
    needs: [lint-and-build]
    uses: dyyz1993/ci-tools/.github/workflows/feishu-notify.yml@main
    with:
      jobs: '{"lint-and-build":"${{ needs.lint-and-build.result }}"}'
      sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
      actor: ${{ github.actor }}
      repo: ${{ github.repository }}
      run-id: ${{ github.run_id }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
