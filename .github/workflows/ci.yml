name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  feishu-notify:
    name: Feishu Notification
    if: always()
    needs: [ci]
    uses: dyyz1993/ci-tools/.github/workflows/feishu-notify.yml@main
    with:
      jobs: '{"ci":"${{ needs.ci.result }}"}'
      sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
      actor: ${{ github.actor }}
      repo: ${{ github.repository }}
      run-id: ${{ github.run_id }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
