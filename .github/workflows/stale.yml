name: Stale Issues

on:
  schedule:
    - cron: '0 2 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: |
            此 issue 已 30 天无活动，将在 7 天后自动关闭。如有需要请重新打开或添加评论。
          stale-pr-message: |
            此 PR 已 14 天无活动，将在 7 天后自动关闭。如有需要请重新打开或更新。
          close-issue-message: '此 issue 因长期无活动已自动关闭。'
          close-pr-message: '此 PR 因长期无活动已自动关闭。'
          exempt-issue-labels: 'pinned,enhancement,bug'
          exempt-pr-labels: 'pinned'
