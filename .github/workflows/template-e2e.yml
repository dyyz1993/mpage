name: Template E2E Validation

on:
  push:
    branches: [master, main]
    paths:
      - 'packages/core/src/scaffold/**'
      - 'packages/create-xcli/**'
      - '.github/workflows/template-e2e.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'packages/core/src/scaffold/**'
      - 'packages/create-xcli/**'
  workflow_dispatch:

jobs:
  validate-templates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [base, minimal-plugin, browser, database, api]
        node-version: [20]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Generate project from ${{ matrix.template }} template
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js test-${{ matrix.template }} --template ${{ matrix.template }}
          cd test-${{ matrix.template }}
          echo "=== Generated files ==="
          find . -not -path '*/node_modules/*' -type f
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Validate generated structure
        run: |
          PROJECT_DIR="/tmp/test-${{ matrix.template }}"

          test -f "$PROJECT_DIR/package.json" || { echo "Missing package.json"; exit 1; }

          if [ "${{ matrix.template }}" != "minimal-plugin" ]; then
            test -d "$PROJECT_DIR/src" || { echo "Missing src/"; exit 1; }
          fi

          echo "Structure validation passed for ${{ matrix.template }}"

      - name: Install generated project dependencies
        run: |
          cd /tmp/test-${{ matrix.template }}
          if grep -q '"@dyyz1993/xcli-core"' package.json; then
            npm install @dyyz1993/xcli-core@${{ github.workspace }}/packages/core --legacy-peer-deps --no-save 2>&1 | tail -5
          fi
          npm install --legacy-peer-deps 2>&1 | tail -5

      - name: Build generated project
        run: |
          cd /tmp/test-${{ matrix.template }}
          if grep -q '"build"' package.json; then
            npm run build 2>&1 | tail -10
          else
            echo "No build script, skipping"
          fi

  full-user-journey:
    runs-on: ubuntu-latest
    needs: validate-templates
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Journey 1 - Create base CLI, build and run
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js journey-test
          cd journey-test
          npm install @dyyz1993/xcli-core@${{ github.workspace }}/packages/core --legacy-peer-deps --no-save
          npm install --legacy-peer-deps
          npm run build
          echo "=== Run CLI ==="
          node dist/cli.js 2>&1 || true
          echo "Journey 1 passed"
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Journey 2 - Create plugin and verify structure
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js my-plugin -t minimal-plugin
          cd my-plugin
          cat index.ts
          grep -q "createSite" index.ts || { echo "Missing createSite"; exit 1; }
          grep -q "hello" index.ts || { echo "Missing hello command"; exit 1; }
          echo "Journey 2 passed"
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Journey 3 - Test database template commands
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js journey-db -t database
          cd journey-db
          npm install @dyyz1993/xcli-core@${{ github.workspace }}/packages/core --legacy-peer-deps --no-save
          npm install --legacy-peer-deps
          npm run build
          echo "=== Verify CLI loads ==="
          node dist/cli.js --help
          echo "=== Verify database commands ==="
          node dist/cli.js query --help || true
          node dist/cli.js tables --help || true
          echo "Journey 3 passed"
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Journey 4 - Test api template commands
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js journey-api -t api
          cd journey-api
          npm install @dyyz1993/xcli-core@${{ github.workspace }}/packages/core --legacy-peer-deps --no-save
          npm install --legacy-peer-deps
          npm run build
          echo "=== Verify CLI loads ==="
          node dist/cli.js --help
          echo "=== Verify api commands ==="
          node dist/cli.js get --help || true
          node dist/cli.js post --help || true
          echo "Journey 4 passed"
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Journey 5 - Test plugin install via local
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js journey-plugin -t base
          cd journey-plugin
          npm install @dyyz1993/xcli-core@${{ github.workspace }}/packages/core --legacy-peer-deps --no-save
          npm install --legacy-peer-deps
          npm run build
          echo "=== Create local test plugin ==="
          mkdir -p .xcli/plugins/test-hello
          cat > .xcli/plugins/test-hello/index.ts << 'PLUGINEOF'
          export default function(cli: any): void {
            const site = cli.createSite({ name: 'test-hello', url: 'https://example.com' });
            site.command('ping', {
              description: 'Ping test',
              handler: async () => ({ success: true, data: { pong: true }, tips: ['pong'] }),
            });
          }
          PLUGINEOF
          cat > .xcli/plugins/test-hello/package.json << 'PKGEOF'
          { "name": "test-hello", "version": "1.0.0", "type": "module" }
          PKGEOF
          echo "=== Rebuild with plugin ==="
          npm run build
          node dist/cli.js --help
          echo "Journey 5 passed"
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

  # Verify that scaffolded templates have working husky pre-commit hooks
  # Case 1: Clean commit should succeed (lint passes)
  # Case 2: Commit with lint errors should be rejected (husky blocks)
  husky-hook-validation:
    runs-on: ubuntu-latest
    needs: validate-templates
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Generate base CLI project
        run: |
          cd /tmp
          node ${{ github.workspace }}/packages/create-xcli/dist/create-xcli.js husky-test
          cd husky-test
          npm install @dyyz1993/xcli-core@${{ github.workspace }}/packages/core --legacy-peer-deps --no-save
          npm install --legacy-peer-deps
          echo "=== Project generated ==="
          ls -la
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Verify engineering files exist
        run: |
          DIR="/tmp/husky-test"
          test -f "$DIR/eslint.config.js" || { echo "FAIL: Missing eslint.config.js"; exit 1; }
          test -f "$DIR/.editorconfig" || { echo "FAIL: Missing .editorconfig"; exit 1; }
          test -f "$DIR/.husky/pre-commit" || { echo "FAIL: Missing .husky/pre-commit"; exit 1; }
          echo "All engineering files present"

      - name: "Case 1: Clean commit should pass (husky hook triggers, lint succeeds)"
        run: |
          cd /tmp/husky-test
          git init
          git config user.email "ci@test.com"
          git config user.name "CI"
          npm run prepare  # initialize husky
          git add .
          git commit -m "chore: initial scaffold" 2>&1
          echo "=== Case 1 PASSED: clean commit succeeded ==="

      - name: "Case 2: Lint-violating commit should be rejected (husky hook blocks)"
        run: |
          cd /tmp/husky-test
          # Add code that violates @typescript-eslint/no-unused-vars (error level)
          cat >> src/version.ts << 'EOF'

          // This triggers no-unused-vars error → lint-staged blocks commit
          const _unusedVar123 = 'this should cause a lint error';
          const x: string = 'unused';
          EOF
          git add src/version.ts
          # We expect this to FAIL (non-zero exit code)
          if git commit -m "feat: add lint errors" 2>&1; then
            echo "=== Case 2 FAILED: commit should have been blocked by husky! ==="
            exit 1
          else
            echo "=== Case 2 PASSED: husky correctly rejected the commit ==="
          fi

  notify:
    needs: [validate-templates, full-user-journey, husky-hook-validation]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify failure
        run: echo "Template E2E validation failed!"
